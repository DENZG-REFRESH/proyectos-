<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Básica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            width: 100%;
            max-width: 450px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: none;
        }
        .card-header {
            background-color: #0d6efd; /* Azul de la cabecera */
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            border-top-left-radius: 8px !important;
            border-top-right-radius: 8px !important;
        }
        
        .btn-sumar { background-color: #198754; color: white; }      /* Verde */
        .btn-restar { background-color: #ffc107; color: black; }     /* Amarillo */
        .btn-multiplicar { background-color: #0dcaf0; color: black; }  /* Celeste */
        .btn-dividir { background-color: #dc3545; color: white; }     /* Rojo */
        
        .btn-custom {
            width: 100%;
            margin-bottom: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header text-center py-3">
            Calculadora Básica
        </div>
        
        <div class="card-body p-4">
            <div class="mb-3">
                <label for="num1" class="form-label text-secondary fw-semibold">Primer Número</label>
                <input type="number" id="num1" class="form-control" placeholder="0">
            </div>

            <div class="mb-3">
                <label for="num2" class="form-label text-secondary fw-semibold">Segundo Número</label>
                <input type="number" id="num2" class="form-control" placeholder="0">
            </div>

            <div class="mt-4">
                <button onclick="operacion('sumar')" class="btn btn-custom btn-sumar">Sumar</button>
                <button onclick="operacion('restar')" class="btn btn-custom btn-restar">Restar</button>
                <button onclick="operacion('multiplicar')" class="btn btn-custom btn-multiplicar">Multiplicar</button>
                <button onclick="operacion('dividir')" class="btn btn-custom btn-dividir">Dividir</button>
            </div>

            <div class="mt-4">
                <label for="resultado" class="form-label text-secondary fw-semibold">Resultado</label>
                <input type="text" id="resultado" class="form-control" readonly>
            </div>
        </div>
    </div>

    <script>
        function operacion(tipo) {
           
            const n1 = parseFloat(document.getElementById('num1').value);
            const n2 = parseFloat(document.getElementById('num2').value);
            const inputResultado = document.getElementById('resultado');

            
            if (isNaN(n1) || !num1.value || isNaN(n2) || !num2.value) {
                alert("Por favor, ingresa ambos números.");
                return;
            }

            let res = 0;

           
            switch(tipo) {
                case 'sumar':
                    res = n1 + n2;
                    break;
                case 'restar':
                    res = n1 - n2;
                    break;
                case 'multiplicar':
                    res = n1 * n2;
                    break;
                case 'dividir':
                    if (n2 === 0) {
                        alert("No se puede dividir entre cero.");
                        return;
                    }
                    res = n1 / n2;
                    break;
            }

            
            inputResultado.value = res;
        }
    </script>

</body>
</html>
